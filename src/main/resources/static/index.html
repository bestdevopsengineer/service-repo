<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIBC Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
    }

    img {
      max-width: 260px;
      margin-bottom: 20px;
    }

    h1 {
      color: #b71c3a;
      margin: 0;
    }

    p {
      color: #444;
      margin-top: 10px;
    }

    .blink-name {
  font-size: 28px;
  color: #b71c3a;
  font-weight: bold;
  animation: blink 1s infinite;
    }

    @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="card">
  <img src="/cibc.png" alt="CIBC Logo" />

  <h1>Welcome to the DevOps Team</h1>

  <p style="font-size:20px; font-weight:bold;">
    Please help us welcome
  </p>

    <p class="blink-name">
    Dubois Jou 🎉
    </p>

  <p>
    Deployed successfully with Blue-Green Deployment on Kubernetes
  </p>
</div>
</body>
</html>
