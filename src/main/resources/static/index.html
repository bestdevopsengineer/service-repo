<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIBC Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
    }

    img {
      max-width: 260px;
      margin-bottom: 20px;
    }

    h1 {
      color: #b71c3a;
      margin: 0;
    }

    p {
      color: #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/cibc.png" alt="CIBC Logo" />
    <h1>Welcome to CIBC Demo</h1>
    <p>Blue-Green Deployment on Kubernetes</p>
  </div>
</body>
</html>
