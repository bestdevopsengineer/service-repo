apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
      version: green
  template:
    metadata:
      labels:
        app: order-service
        version: green
    spec:
      containers:
        - name: order-service
          image: ovdi/order-service:this-tag-does-not-exist
          ports:
            - containerPort: 8080
