name: Service CI

on:
  pull_request:
    branches: 
      - main
      - dev
      - test
      - prod
  push:
    branches: 
      - main
      - dev
      - test
      - prod

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: bestdevopsengineer/framework-repo/.github/workflows/reusable-ci.yml@main

    secrets: inherit
    with:
      image_name: order-service
      delivery_mode: trunk
      java_version: "21"
      run_tests: true
